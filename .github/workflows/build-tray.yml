name: Build tray application

on:
  push:
    tags:
      - "build*"
      - "test*"
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package and PyInstaller
        run: python -m pip install --upgrade pip && python -m pip install ".[package]"

      - name: Build native app bundle
        run: python -m PyInstaller --noconfirm packaging/pyinstaller/wstpserver-tray.spec

      - name: Install Windows installer tooling
        if: runner.os == 'Windows'
        run: choco install innosetup --no-progress -y

      - name: Build Linux installer
        if: runner.os == 'Linux'
        run: bash packaging/installers/linux/build-installer.sh

      - name: Build macOS installer
        if: runner.os == 'macOS'
        run: bash packaging/installers/macos/build-pkg.sh

      - name: Build Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\packaging\installers\windows\build-installer.ps1

      - name: Upload artifact
        if: startsWith(github.ref, 'refs/tags/v') || startsWith(github.ref, 'refs/tags/build')
        uses: actions/upload-artifact@v4
        with:
          name: WSTPServerManager-${{ runner.os }}
          path: dist/installers/*

  release:
    name: Attach installers to release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest

    steps:
      - name: Download installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: WSTPServerManager-*
          path: release-assets
          merge-multiple: true

      - name: Attach installers to GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1 || \
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "$TAG_NAME" --notes "Release $TAG_NAME"
          gh release upload "$TAG_NAME" release-assets/* --repo "$GH_REPO" --clobber
